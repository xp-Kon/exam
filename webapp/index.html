<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马克思复习题 · 练习工具</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- App Container -->
  <div id="app" class="app-container">
    <!-- Top Nav -->
    <header class="top-nav">
      <button id="sidebarToggle" class="sidebar-toggle" aria-label="切换侧栏">
        <i class="fas fa-bars"></i>
      </button>
      <div class="nav-brand">
        <i class="fas fa-book-open"></i>
        <span>马克思复习题</span>
      </div>
      <div class="nav-stats">
        <span id="progressDisplay"><i class="fas fa-chart-line"></i> 0%</span>
      </div>
      <div class="nav-actions">
        <button id="themeToggle" class="icon-btn" aria-label="切换主题">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-route="dashboard">
          <i class="fas fa-chart-pie"></i><span>统计看板</span>
        </a>
        <a href="#browse" class="nav-item" data-route="browse">
          <i class="fas fa-list"></i><span>题库浏览</span>
        </a>
        <a href="#practice" class="nav-item" data-route="practice">
          <i class="fas fa-play-circle"></i><span>顺序练习</span>
        </a>
        <a href="#random" class="nav-item" data-route="random">
          <i class="fas fa-random"></i><span>随机练习</span>
        </a>
        <a href="#exam" class="nav-item" data-route="exam">
          <i class="fas fa-clipboard-check"></i><span>模拟考试</span>
        </a>
        <a href="#errors" class="nav-item" data-route="errors">
          <i class="fas fa-exclamation-triangle"></i><span>错题本</span>
        </a>
        <a href="#favorites" class="nav-item" data-route="favorites">
          <i class="fas fa-star"></i><span>我的收藏</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="q-count">共 160 题</span>
        <button id="resetBtn" class="reset-btn" title="重置所有数据">
          <i class="fas fa-trash-alt"></i> 重置
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="mainContent" class="main-content">
      <!-- Each page rendered here by app.js -->
    </main>
  </div>

  <!-- Overlay for mobile sidebar -->
  <div id="overlay" class="overlay"></div>

  <!-- Modals -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">确认</h3>
      <p id="modalBody">确定要执行此操作吗？</p>
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-secondary">取消</button>
        <button id="modalConfirm" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
